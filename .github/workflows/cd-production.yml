name: Production OTA Deployment

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ios_version:
        description: 'iOS minimum version (leave empty to use Info.plist)'
        required: false
        type: string
      android_version:
        description: 'Android minimum version (leave empty to use version.properties)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          ssh-key: ${{ secrets.SCC_FRONTEND_BUILD_CONFIGURATIONS_SSH_KEY }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set iOS version
        id: set_ios_version
        run: |
          if [ -n "${{ github.event.inputs.ios_version }}" ]; then
            echo "IOS_VERSION=${{ github.event.inputs.ios_version }}" >> $GITHUB_ENV
            echo "Using manual input iOS version: ${{ github.event.inputs.ios_version }}"
          else
            IOS_VERSION=$(grep -A1 "<key>CFBundleShortVersionString</key>" ios/sccReactNative/Info.plist | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
            echo "IOS_VERSION=$IOS_VERSION" >> $GITHUB_ENV
            echo "Using iOS version from Info.plist: $IOS_VERSION"
          fi

      - name: Set Android version
        id: set_android_version
        run: |
          if [ -n "${{ github.event.inputs.android_version }}" ]; then
            echo "ANDROID_VERSION=${{ github.event.inputs.android_version }}" >> $GITHUB_ENV
            echo "Using manual input Android version: ${{ github.event.inputs.android_version }}"
          else
            ANDROID_VERSION=$(cat android/app/version.properties | grep version | cut -d'=' -f2)
            echo "ANDROID_VERSION=$ANDROID_VERSION" >> $GITHUB_ENV
            echo "Using Android version from version.properties: $ANDROID_VERSION"
          fi

      - name: Deploy iOS OTA
        run: yarn ota-deploy:production -p ios -t ${{ env.IOS_VERSION }} -f

      - name: Deploy Android OTA
        run: yarn ota-deploy:production -p android -t ${{ env.ANDROID_VERSION }} -f

      - name: Invalidate CloudFront cache
        run: |
          eval $(grep -v '^#' subprojects/scc-frontend-build-configurations/production/.env.hot-updater | sed 's/^/export /')
          AWS_ACCESS_KEY_ID=$HOT_UPDATER_S3_ACCESS_KEY_ID \
          AWS_SECRET_ACCESS_KEY=$HOT_UPDATER_S3_SECRET_ACCESS_KEY \
          AWS_DEFAULT_REGION=us-east-1 \
          aws cloudfront create-invalidation \
            --distribution-id EMPFRCVXZDEM7 \
            --paths "/api/*"

      - name: Generate changelog
        id: changelog
        run: |
          # Use tag name if triggered by tag push, otherwise find latest v* tag
          if [[ "${{ github.ref_name }}" == v* ]]; then
            DEPLOY_REF="${{ github.ref_name }}"
          else
            DEPLOY_REF=$(git tag --sort=-creatordate | grep '^v' | head -1)
            DEPLOY_REF="${DEPLOY_REF:-main}"
          fi
          echo "DEPLOY_REF=$DEPLOY_REF" >> $GITHUB_ENV

          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${DEPLOY_REF}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --format="• %s" ${PREV_TAG}..HEAD --no-merges | head -20)
            RANGE_TEXT="이전 배포(${PREV_TAG}) 이후 변경사항:"
          else
            CHANGELOG=$(git log --format="• %s" -20 --no-merges)
            RANGE_TEXT="최근 변경사항:"
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "${RANGE_TEXT}"
            echo "${CHANGELOG}"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Extract bundle IDs
        if: success()
        run: |
          eval $(grep -v '^#' subprojects/scc-frontend-build-configurations/production/.env.hot-updater | sed 's/^/export /')
          IOS_BUNDLE_ID=$(AWS_ACCESS_KEY_ID=$HOT_UPDATER_S3_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY=$HOT_UPDATER_S3_SECRET_ACCESS_KEY \
            AWS_DEFAULT_REGION=$HOT_UPDATER_S3_REGION \
            aws s3 cp s3://$HOT_UPDATER_S3_BUCKET_NAME/ios/${{ env.IOS_VERSION }}/update.json - \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          ANDROID_BUNDLE_ID=$(AWS_ACCESS_KEY_ID=$HOT_UPDATER_S3_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY=$HOT_UPDATER_S3_SECRET_ACCESS_KEY \
            AWS_DEFAULT_REGION=$HOT_UPDATER_S3_REGION \
            aws s3 cp s3://$HOT_UPDATER_S3_BUCKET_NAME/android/${{ env.ANDROID_VERSION }}/update.json - \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          echo "IOS_BUNDLE_ID=$IOS_BUNDLE_ID" >> $GITHUB_ENV
          echo "ANDROID_BUNDLE_ID=$ANDROID_BUNDLE_ID" >> $GITHUB_ENV

      - name: Notify Slack on Success
        if: success()
        run: |
          CURRENT_GITHUB_ACTION_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data "{\"attachments\":[{\"color\":\"#0000FF\",\"title\":\"✅ 계단정복지도 앱 업데이트 배포 완료\", \"text\":\"앱을 재시작하면 새 버전이 자동으로 적용됩니다.\n\n*배포 버전*\niOS: ${{ env.IOS_VERSION }} / Android: ${{ env.ANDROID_VERSION }}\nBundle: iOS \`${{ env.IOS_BUNDLE_ID }}\`, Android \`${{ env.ANDROID_BUNDLE_ID }}\`\n배포 ref: ${{ env.DEPLOY_REF }} (<$CURRENT_GITHUB_ACTION_RUN_URL|배포 상세보기>)\n\n${{ env.CHANGELOG }}\"}]}" ${{ secrets.SCC_APP_DEPLOY_NOTICE_SLACK_URL }}

      - name: Notify Slack on Failure
        if: failure()
        run: |
          CURRENT_GITHUB_ACTION_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data "{\"attachments\":[{\"color\":\"#FF0000\",\"title\":\"[PROD] Scc-App OTA Deployment Failed\", \"text\":\"<!subteam^S052B9WNGCV> iOS: ${{ env.IOS_VERSION }}, Android: ${{ env.ANDROID_VERSION }}\n배포 ref: ${{ env.DEPLOY_REF }} (<$CURRENT_GITHUB_ACTION_RUN_URL|github action run url>)\"}]}" ${{ secrets.SLACK_URL_SCC_SERVER_CHANNEL }}
